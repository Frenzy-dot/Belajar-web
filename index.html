<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="stylesheet" href="css/style.css">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gloo.std | Streetwear Essentials</title>

</head>
<body>
  <div class="container">
    <nav>
      <div class="logo">gloo<span>.std</span></div>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#produk">Produk</a></li>
        <li><a href="#">Lookbook</a></li>
      </ul>
      <button class="cart-btn">Cart (0)</button>
    </nav>

    <section class="hero">
      <h1>DEFINE YOUR <span>STYLE</span></h1>
      <p>Clothing Designer</p>
      <p>- Art work/Graphic for sale</p>
      <p>- Comission OPEN</p>
      <a href="#produk" class="btn">Belanja Sekarang</a>
    </section>

    <section class="products" id="produk">
      <h2>New Drops</h2>
      <div class="grid">
        <div class="card">
          <img src="Barang/full-set-design.jpeg" alt="Full Set">
          <div class="card-body">
            <h3>Design For Sale!!!</h3>
            <p class="price">$70</p>
            <button class="buy-btn add-to-cart"data-id="1" data-name="full-set-design" data-price="70">+ Add to Cart</button>
          </div>
        </div>
        <div class="card">
          <img src="Barang/hoodie-design-1.jpeg" alt="Hoodie">
          <div class="card-body">
            <h3>Design For Sale!!!</h3>
            <p class="price">$55</p>
            <button class="buy-btn add-to-cart"data-id="1" data-name="hoodie-design-1" data-price="55">+ Add to Cart</button>
          </div>
        </div>
        <div class="card">
          <img src="Barang/hoodie-design-2.jpeg" alt="Hoodie">
          <div class="card-body">
            <h3>Design For Sale!!!</h3>
            <p class="price">$50</p>
            <button class="buy-btn add-to-cart"data-id="1" data-name="hoodie-design-2" data-price="50">+ Add to Cart</button>
          </div>
        </div>
      </div>
    </section>
  </div>
  
  <footer>
    <p>© 2026 gloo.std. All rights reserved. Made in Banten.</p>
  </footer>

  <script src="js/script.js" defer></script>

</body>
</html>
